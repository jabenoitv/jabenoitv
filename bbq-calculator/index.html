<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 BBQ Smoking Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px 20px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 2em;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95em;
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            font-size: 0.9em;
        }

        .form-group select,
        .form-group input {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .weight-input-group,
        .temp-input-group {
            display: flex;
            gap: 8px;
        }

        .weight-input-group input,
        .temp-input-group input {
            flex: 1;
        }

        .unit-toggle {
            padding: 10px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-size: 0.9em;
            min-width: 50px;
        }

        .unit-toggle:hover {
            background: #764ba2;
        }

        .unit-toggle:active {
            transform: scale(0.95);
        }

        .calculate-btn {
            grid-column: 1 / -1;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .results-section {
            animation: fadeIn 0.5s ease-out;
            display: none;
        }

        .results-section.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .result-header h2 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 5px;
        }

        .result-weight {
            color: #666;
            font-size: 0.95em;
        }

        .result-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .card.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-left-color: #fff;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            margin-bottom: 12px;
            font-size: 1em;
        }

        .card .note {
            font-size: 0.8em;
            opacity: 0.8;
            margin-top: 8px;
        }

        .time-display {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 2em;
            font-weight: 700;
        }

        .time-display .minutes {
            font-size: 1em;
            opacity: 0.9;
        }

        .temp-range p {
            margin: 6px 0;
            font-size: 0.95em;
        }

        .temp-range strong {
            color: #667eea;
            font-weight: 700;
        }

        .temp-range .secondary-unit {
            color: #999;
            font-size: 0.85em;
            font-weight: 400;
            margin-left: 4px;
        }

        .card.primary .temp-range strong {
            color: #ffeb3b;
        }

        .card.primary .temp-range .secondary-unit {
            color: rgba(255, 255, 255, 0.7);
        }

        .holding-time {
            text-align: center;
        }

        .holding-time .duration {
            display: block;
            font-size: 1.8em;
            font-weight: 700;
            margin: 8px 0;
        }

        .temperature-chart {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .temperature-chart h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.1em;
        }

        .bars {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            gap: 10px;
            height: 250px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }

        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            height: 100%;
        }

        .bar {
            width: 100%;
            border-radius: 6px 6px 0 0;
            transition: all 0.3s ease;
            min-height: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .temp-label {
            margin-top: 8px;
            font-size: 0.75em;
            font-weight: 600;
            color: #333;
            text-align: center;
            white-space: nowrap;
            line-height: 1.2;
        }

        .temp-label .secondary {
            display: block;
            color: #999;
            font-size: 0.85em;
            font-weight: 400;
        }

        .stages {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .stage-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: white;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            font-size: 0.9em;
        }

        .stage-temp {
            font-weight: 700;
            color: #667eea;
            min-width: 70px;
        }

        .stage-temp .secondary {
            color: #999;
            font-weight: 400;
            font-size: 0.85em;
        }

        .stage-name {
            color: #666;
        }

        .tips-section {
            background: linear-gradient(135deg, #fff9e6 0%, #ffe0cc 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #FFD93D;
        }

        .tips-section h3 {
            color: #d97706;
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        .tips-section ul {
            list-style: none;
            padding-left: 0;
        }

        .tips-section li {
            color: #666;
            margin: 8px 0;
            padding-left: 20px;
            position: relative;
            line-height: 1.5;
            font-size: 0.9em;
        }

        .tips-section li:before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #d97706;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            h1 { font-size: 1.5em; }

            .input-section {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 15px;
            }

            .calculate-btn { grid-column: 1; }
            .result-cards { grid-template-columns: 1fr; }

            .bars {
                height: 200px;
                gap: 6px;
            }

            .stages { grid-template-columns: 1fr; }
            .time-display { font-size: 1.5em; }
            .holding-time .duration { font-size: 1.4em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 BBQ Smoking Calculator</h1>
        <p class="subtitle">Calcula tiempo y temperatura para tu ahumado perfecto</p>

        <div class="input-section">
            <div class="form-group">
                <label for="meatType">Tipo de Carne</label>
                <select id="meatType">
                    <option value="brisket">Brisket</option>
                    <option value="pork_butt">Pork Butt</option>
                    <option value="pork_shoulder">Pork Shoulder</option>
                    <option value="ribs">Costillas (Ribs)</option>
                    <option value="beef_ribs">Costillas de Res (Beef Ribs)</option>
                    <option value="chicken">Pollo</option>
                    <option value="turkey">Pavo</option>
                </select>
            </div>

            <div class="form-group">
                <label for="weight">Peso</label>
                <div class="weight-input-group">
                    <input id="weight" type="number" value="2.3" min="0.1" step="0.1">
                    <button class="unit-toggle" onclick="toggleWeightUnit()" id="weightUnitBtn">kg</button>
                </div>
            </div>

            <div class="form-group">
                <label for="smokingTemp">Temperatura del Ahumador</label>
                <div class="temp-input-group">
                    <input id="smokingTemp" type="number" value="110" min="65" max="180" step="1">
                    <button class="unit-toggle" onclick="toggleTempUnit()" id="tempUnitBtn">°C</button>
                </div>
            </div>

            <button class="calculate-btn" onclick="calculate()">Calcular</button>
        </div>

        <div id="results" class="results-section"></div>
    </div>

    <script>
        // Fórmulas basadas en kg y °C como unidades primarias
        const MEAT_FORMULAS = {
            brisket: {
                name: 'Brisket',
                timePerKg: 1.65, // ~1.5 hrs/lb = 3.3 hrs/kg, ajustado para temp media
                minTempC: 88,    // 190°F
                optimalTempC: 96, // 205°F
                holdingMin: 60
            },
            pork_butt: {
                name: 'Pork Butt',
                timePerKg: 2.2,
                minTempC: 88,
                optimalTempC: 96,
                holdingMin: 90
            },
            pork_shoulder: {
                name: 'Pork Shoulder',
                timePerKg: 2.2,
                minTempC: 88,
                optimalTempC: 96,
                holdingMin: 90
            },
            ribs: {
                name: 'Costillas (Ribs)',
                timePerKg: 1.1,
                minTempC: 88,
                optimalTempC: 93,
                holdingMin: 15
            },
            beef_ribs: {
                name: 'Costillas de Res (Beef Ribs)',
                timePerKg: 1.4,
                minTempC: 88,
                optimalTempC: 96,
                holdingMin: 30
            },
            chicken: {
                name: 'Pollo',
                timePerKg: 0.85,
                minTempC: 74,
                optimalTempC: 74,
                holdingMin: 10
            },
            turkey: {
                name: 'Pavo',
                timePerKg: 0.85,
                minTempC: 74,
                optimalTempC: 74,
                holdingMin: 20
            }
        };

        // Estado: empezamos en métrico
        let weightUnit = 'kg';  // kg o lbs
        let tempUnit = 'C';     // C o F

        function celsiusToFahrenheit(c) {
            return Math.round((c * 9 / 5) + 32);
        }

        function fahrenheitToCelsius(f) {
            return Math.round(((f - 32) * 5 / 9) * 10) / 10;
        }

        function kgToLbs(kg) {
            return Math.round(kg * 2.20462 * 10) / 10;
        }

        function lbsToKg(lbs) {
            return Math.round(lbs * 0.453592 * 10) / 10;
        }

        function toggleWeightUnit() {
            const weightInput = document.getElementById('weight');
            const btn = document.getElementById('weightUnitBtn');
            const currentValue = parseFloat(weightInput.value);

            if (weightUnit === 'kg') {
                weightInput.value = kgToLbs(currentValue);
                btn.textContent = 'lbs';
                weightUnit = 'lbs';
            } else {
                weightInput.value = lbsToKg(currentValue);
                btn.textContent = 'kg';
                weightUnit = 'kg';
            }
        }

        function toggleTempUnit() {
            const tempInput = document.getElementById('smokingTemp');
            const btn = document.getElementById('tempUnitBtn');
            const currentValue = parseFloat(tempInput.value);

            if (tempUnit === 'C') {
                tempInput.value = celsiusToFahrenheit(currentValue);
                btn.textContent = '°F';
                tempInput.min = 150;
                tempInput.max = 350;
                tempInput.step = 5;
                tempUnit = 'F';
            } else {
                tempInput.value = fahrenheitToCelsius(currentValue);
                btn.textContent = '°C';
                tempInput.min = 65;
                tempInput.max = 180;
                tempInput.step = 1;
                tempUnit = 'C';
            }
        }

        function calculate() {
            const meatType = document.getElementById('meatType').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const smokingTemp = parseFloat(document.getElementById('smokingTemp').value);

            const formula = MEAT_FORMULAS[meatType];

            // Normalizamos todo a métrico
            const weightKg = weightUnit === 'kg' ? weight : lbsToKg(weight);
            const smokingTempC = tempUnit === 'C' ? smokingTemp : fahrenheitToCelsius(smokingTemp);

            // Cálculo de tiempo base
            let cookingTimeHours = weightKg * formula.timePerKg;

            // Ajuste por temperatura (referencia: 107°C / 225°F)
            const tempDiffC = smokingTempC - 107;
            const adjustmentFactor = 1 - (tempDiffC * 0.015);
            cookingTimeHours = cookingTimeHours * Math.max(0.6, Math.min(1.4, adjustmentFactor));

            const totalMinutes = Math.round(cookingTimeHours * 60);
            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;

            const temperatureRange = generateTempRange(formula.minTempC, formula.optimalTempC, 8);

            // Conversiones para mostrar
            const weightKgDisplay = Math.round(weightKg * 100) / 100;
            const weightLbsDisplay = kgToLbs(weightKg);
            const smokingTempCDisplay = Math.round(smokingTempC);
            const smokingTempFDisplay = celsiusToFahrenheit(smokingTempC);
            const minTempF = celsiusToFahrenheit(formula.minTempC);
            const optimalTempF = celsiusToFahrenheit(formula.optimalTempC);

            const resultsHTML = `
                <div class="result-header">
                    <h2>${formula.name}</h2>
                    <p class="result-weight">
                        ${weightKgDisplay} kg <span style="color:#999">(${weightLbsDisplay} lbs)</span>
                        •
                        ${smokingTempCDisplay}°C <span style="color:#999">(${smokingTempFDisplay}°F)</span>
                    </p>
                </div>

                <div class="result-cards">
                    <div class="card primary">
                        <h3>Tiempo de Cocción</h3>
                        <div class="time-display">
                            <span class="hours">${hours}h</span>
                            <span class="minutes">${minutes}m</span>
                        </div>
                        <p class="note">Tiempo aproximado de ahumado</p>
                    </div>

                    <div class="card">
                        <h3>Temperatura Interna Objetivo</h3>
                        <div class="temp-range">
                            <p>Mínima: <strong>${formula.minTempC}°C</strong><span class="secondary-unit">(${minTempF}°F)</span></p>
                            <p>Óptima: <strong>${formula.optimalTempC}°C</strong><span class="secondary-unit">(${optimalTempF}°F)</span></p>
                        </div>
                    </div>

                    <div class="card">
                        <h3>Tiempo de Reposo</h3>
                        <div class="holding-time">
                            <span class="duration">${formula.holdingMin} min</span>
                        </div>
                        <p class="note">A 60°C (140°F) después de cocción</p>
                    </div>
                </div>

                <div class="temperature-chart">
                    <h3>Progresión de Temperatura Interna</h3>
                    <div class="bars">
                        ${temperatureRange.map(item => {
                            const percentage = ((item.tempC - formula.minTempC) / Math.max(1, (formula.optimalTempC - formula.minTempC))) * 100;
                            const color = getColorForTemp(item.tempC, formula.optimalTempC, formula.minTempC);
                            const tempF = celsiusToFahrenheit(item.tempC);
                            return `
                                <div class="bar-item">
                                    <div class="bar" style="height: ${Math.max(percentage, 5)}%; background: ${color};"></div>
                                    <span class="temp-label">${item.tempC}°C<span class="secondary">${tempF}°F</span></span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    <div class="stages">
                        ${temperatureRange.map(item => `
                            <div class="stage-item">
                                <span class="stage-temp">${item.tempC}°C <span class="secondary">(${celsiusToFahrenheit(item.tempC)}°F)</span></span>
                                <span class="stage-name">${item.stage}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="tips-section">
                    <h3>💡 Consejos</h3>
                    <ul>
                        <li>Usa un termómetro de carne confiable para verificar la temperatura interna</li>
                        <li>El "wrap" con papel a 74°C (165°F) acelera la cocción y previene resecamiento</li>
                        <li>Los tiempos son aproximados; viento, humedad y abrir la tapa afectan la cocción</li>
                        <li>Reposa la carne en caja aislante a 60°C (140°F) para distribuir jugos</li>
                        <li>Mantén la temperatura del ahumador consistente durante todo el proceso</li>
                    </ul>
                </div>
            `;

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = resultsHTML;
            resultsDiv.classList.add('show');
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function generateTempRange(minTempC, maxTempC, steps) {
            const result = [];
            const range = maxTempC - minTempC;

            // Si el rango es 0 (pollo/pavo), mostramos progresión desde temp ambiente
            if (range === 0) {
                const startTemp = 40;
                const stepSize = (maxTempC - startTemp) / steps;
                for (let i = 0; i <= steps; i++) {
                    const temp = startTemp + stepSize * i;
                    result.push({
                        tempC: Math.round(temp),
                        stage: getStageForProgress(i / steps)
                    });
                }
                return result;
            }

            const step = range / steps;
            for (let i = 0; i <= steps; i++) {
                const temp = minTempC + step * i;
                result.push({
                    tempC: Math.round(temp),
                    stage: getStageForProgress(i / steps)
                });
            }
            return result;
        }

        function getStageForProgress(progress) {
            if (progress < 0.25) return 'Cocción inicial';
            if (progress < 0.55) return 'Stall (meseta)';
            if (progress < 0.85) return 'Cocción avanzada';
            if (progress < 1) return 'Casi listo';
            return 'Listo - retirar';
        }

        function getColorForTemp(tempC, optimalC, minC) {
            const range = optimalC - minC;
            if (range === 0) {
                const pct = tempC / optimalC;
                if (pct < 0.5) return '#FF6B6B';
                if (pct < 0.75) return '#FFD93D';
                if (pct < 0.95) return '#6BCB77';
                return '#4D96FF';
            }
            const pct = (tempC - minC) / range;
            if (pct < 0.25) return '#FF6B6B';
            if (pct < 0.55) return '#FFD93D';
            if (pct < 0.85) return '#6BCB77';
            return '#4D96FF';
        }
    </script>
</body>
</html>
