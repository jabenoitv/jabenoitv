<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 BBQ Smoking Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px 20px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 2em;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95em;
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            font-size: 0.9em;
        }

        .form-group select,
        .form-group input {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .weight-input-group,
        .temp-input-group {
            display: flex;
            gap: 8px;
        }

        .weight-input-group input,
        .temp-input-group input {
            flex: 1;
        }

        .unit-toggle {
            padding: 10px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-size: 0.9em;
            min-width: 50px;
        }

        .unit-toggle:hover {
            background: #764ba2;
        }

        .unit-toggle:active {
            transform: scale(0.95);
        }

        .button-group {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 10px;
        }

        .calculate-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .secondary-btn {
            padding: 10px 16px;
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .secondary-btn:hover {
            background: #e0e0e0;
            border-color: #667eea;
        }

        .results-section {
            animation: fadeIn 0.5s ease-out;
            display: none;
        }

        .results-section.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .result-header h2 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 5px;
        }

        .result-weight {
            color: #666;
            font-size: 0.95em;
        }

        .result-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .card.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-left-color: #fff;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            margin-bottom: 12px;
            font-size: 1em;
        }

        .card .note {
            font-size: 0.8em;
            opacity: 0.8;
            margin-top: 8px;
        }

        .time-display {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 2em;
            font-weight: 700;
        }

        .time-display .minutes {
            font-size: 1em;
            opacity: 0.9;
        }

        .temp-range p {
            margin: 6px 0;
            font-size: 0.95em;
        }

        .temp-range strong {
            color: #667eea;
            font-weight: 700;
        }

        .temp-range .secondary-unit {
            color: #999;
            font-size: 0.85em;
            font-weight: 400;
            margin-left: 4px;
        }

        .card.primary .temp-range strong {
            color: #ffeb3b;
        }

        .card.primary .temp-range .secondary-unit {
            color: rgba(255, 255, 255, 0.7);
        }

        .holding-time {
            text-align: center;
        }

        .holding-time .duration {
            display: block;
            font-size: 1.8em;
            font-weight: 700;
            margin: 8px 0;
        }

        .temperature-chart {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .temperature-chart h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.1em;
        }

        .bars {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            gap: 10px;
            height: 250px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }

        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            height: 100%;
        }

        .bar {
            width: 100%;
            border-radius: 6px 6px 0 0;
            transition: all 0.3s ease;
            min-height: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .temp-label {
            margin-top: 8px;
            font-size: 0.75em;
            font-weight: 600;
            color: #333;
            text-align: center;
            white-space: nowrap;
            line-height: 1.2;
        }

        .temp-label .secondary {
            display: block;
            color: #999;
            font-size: 0.85em;
            font-weight: 400;
        }

        .stages {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .stage-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: white;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            font-size: 0.9em;
        }

        .stage-temp {
            font-weight: 700;
            color: #667eea;
            min-width: 70px;
        }

        .stage-temp .secondary {
            color: #999;
            font-weight: 400;
            font-size: 0.85em;
        }

        .stage-name {
            color: #666;
        }

        .tips-section {
            background: linear-gradient(135deg, #fff9e6 0%, #ffe0cc 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #FFD93D;
            margin-bottom: 20px;
        }

        .tips-section h3 {
            color: #d97706;
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        .tips-section ul {
            list-style: none;
            padding-left: 0;
        }

        .tips-section li {
            color: #666;
            margin: 8px 0;
            padding-left: 20px;
            position: relative;
            line-height: 1.5;
            font-size: 0.9em;
        }

        .tips-section li:before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #d97706;
            font-weight: bold;
        }

        .actions-section {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #764ba2;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 20px;
            background: #333;
            color: white;
            border-radius: 8px;
            z-index: 1000;
            animation: slideInUp 0.3s ease;
        }

        .toast.success {
            background: #4caf50;
        }

        .toast.warning {
            background: #ff9800;
        }

        .toast.error {
            background: #f44336;
        }

        @keyframes slideInUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .history-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            padding: 12px;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .history-item:hover {
            background: #e0e0e0;
            transform: scale(1.02);
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            h1 { font-size: 1.5em; }

            .input-section {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 15px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .result-cards { grid-template-columns: 1fr; }

            .bars {
                height: 200px;
                gap: 6px;
            }

            .stages { grid-template-columns: 1fr; }
            .time-display { font-size: 1.5em; }
            .holding-time .duration { font-size: 1.4em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 BBQ Smoking Calculator</h1>
        <p class="subtitle">Calcula tiempo y temperatura para tu ahumado perfecto</p>

        <div class="input-section">
            <div class="form-group">
                <label for="meatType">Tipo de Carne</label>
                <select id="meatType">
                    <optgroup label="Vacuno">
                        <option value="tapapecho">Tapapecho (Brisket)</option>
                        <option value="plateada">Plateada</option>
                        <option value="punta_ganso">Punta de Ganso (Picaña)</option>
                        <option value="asado_tira">Asado de Tira (Short Ribs)</option>
                    </optgroup>
                    <optgroup label="Cerdo">
                        <option value="paleta_cerdo">Paleta de Cerdo (Pork Shoulder)</option>
                        <option value="costillar_cerdo">Costillar de Cerdo (Pork Ribs)</option>
                    </optgroup>
                    <optgroup label="Ave">
                        <option value="pollo_entero">Pollo Entero (Whole Chicken)</option>
                        <option value="pavo_entero">Pavo Entero (Whole Turkey)</option>
                    </optgroup>
                </select>
            </div>

            <div class="form-group">
                <label for="weight">Peso</label>
                <div class="weight-input-group">
                    <input id="weight" type="number" value="3.0" min="0.1" step="0.1">
                    <button class="unit-toggle" onclick="calculator.toggleWeightUnit()" id="weightUnitBtn">kg</button>
                </div>
            </div>

            <div class="form-group">
                <label for="smokingTemp">Temperatura del Ahumador</label>
                <div class="temp-input-group">
                    <input id="smokingTemp" type="number" value="110" min="65" max="180" step="1">
                    <button class="unit-toggle" onclick="calculator.toggleTempUnit()" id="tempUnitBtn">°C</button>
                </div>
            </div>

            <div class="button-group">
                <button class="calculate-btn" onclick="calculator.calculate()">Calcular</button>
                <button class="secondary-btn" onclick="stateManager.showHistory()">📋 Historial</button>
                <button class="secondary-btn" onclick="stateManager.exportData()">📥 Exportar</button>
                <button class="secondary-btn" onclick="stateManager.importData()">📤 Importar</button>
            </div>
        </div>

        <div id="results" class="results-section"></div>
        <div id="history" style="display:none; margin-bottom: 30px;">
            <h3>Recetas Guardadas</h3>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        // ================================================================
        // 1. EVENT EMITTER - Sistema pub/sub para observabilidad
        // ================================================================
        class EventEmitter {
            constructor() {
                this.events = {};
            }

            /**
             * Suscribirse a un evento
             * @param {string} event - Nombre del evento
             * @param {Function} callback - Función a ejecutar
             */
            on(event, callback) {
                if (!this.events[event]) {
                    this.events[event] = [];
                }
                this.events[event].push(callback);
            }

            /**
             * Desuscribirse de un evento
             */
            off(event, callback) {
                if (this.events[event]) {
                    this.events[event] = this.events[event].filter(cb => cb !== callback);
                }
            }

            /**
             * Emitir un evento
             * @param {string} event - Nombre del evento
             * @param {*} data - Datos a pasar
             */
            emit(event, data) {
                if (this.events[event]) {
                    this.events[event].forEach(callback => {
                        try {
                            callback(data);
                        } catch (err) {
                            console.error(`Error en evento ${event}:`, err);
                        }
                    });
                }
            }
        }

        // ================================================================
        // 2. BBQ ENGINE - Cálculos de cocción
        // ================================================================
        class BBQEngine extends EventEmitter {
            constructor() {
                super();
                this.weightUnit = 'kg';
                this.tempUnit = 'C';
            }

            getMeatFormulas() {
                return {
                    tapapecho: {
                        name: 'Tapapecho (Brisket)',
                        timePerKg: 3.85,
                        minTempC: 88,
                        optimalTempC: 96,
                        holdingMin: 60,
                        description: 'Corte chileno equivalente al brisket. Cocción larga, fall-apart.'
                    },
                    plateada: {
                        name: 'Plateada',
                        timePerKg: 3.35,
                        minTempC: 88,
                        optimalTempC: 96,
                        holdingMin: 45,
                        description: 'Similar al brisket, alternativa al tapapecho.'
                    },
                    punta_ganso: {
                        name: 'Punta de Ganso (Picaña)',
                        timePerKg: 1.65,
                        minTempC: 54,
                        optimalTempC: 60,
                        holdingMin: 15,
                        description: 'Picaña - corte premium, cocción a término medio (no fall-apart).'
                    },
                    asado_tira: {
                        name: 'Asado de Tira (Short Ribs)',
                        timePerKg: 2.35,
                        minTempC: 88,
                        optimalTempC: 96,
                        holdingMin: 30,
                        description: 'Costillas de res chilenas, similar a beef short ribs.'
                    },
                    paleta_cerdo: {
                        name: 'Paleta de Cerdo (Pork Shoulder)',
                        timePerKg: 4.15,
                        minTempC: 88,
                        optimalTempC: 96,
                        holdingMin: 90,
                        description: 'Ideal para pulled pork chileno. Equivalente al Boston Butt.'
                    },
                    costillar_cerdo: {
                        name: 'Costillar de Cerdo (Pork Ribs)',
                        timePerKg: 1.8,
                        minTempC: 88,
                        optimalTempC: 93,
                        holdingMin: 15,
                        description: 'Costillas de cerdo. Método 3-2-1 recomendado.'
                    },
                    pollo_entero: {
                        name: 'Pollo Entero (Whole Chicken)',
                        timePerKg: 1.4,
                        minTempC: 74,
                        optimalTempC: 74,
                        holdingMin: 10,
                        description: 'Pollo completo. Vigilar resecamiento.'
                    },
                    pavo_entero: {
                        name: 'Pavo Entero (Whole Turkey)',
                        timePerKg: 1.4,
                        minTempC: 74,
                        optimalTempC: 74,
                        holdingMin: 20,
                        description: 'Pavo para fiestas. Considerar inyección de líquidos.'
                    }
                };
            }

            /**
             * Convierte Celsius a Fahrenheit
             */
            celsiusToFahrenheit(c) {
                return Math.round((c * 9 / 5) + 32);
            }

            /**
             * Convierte Fahrenheit a Celsius
             */
            fahrenheitToCelsius(f) {
                return Math.round(((f - 32) * 5 / 9) * 10) / 10;
            }

            /**
             * Convierte kg a lbs
             */
            kgToLbs(kg) {
                return Math.round(kg * 2.20462 * 10) / 10;
            }

            /**
             * Convierte lbs a kg
             */
            lbsToKg(lbs) {
                return Math.round(lbs * 0.453592 * 10) / 10;
            }

            /**
             * Cambia unidad de peso
             */
            toggleWeightUnit() {
                const input = document.getElementById('weight');
                const btn = document.getElementById('weightUnitBtn');
                const value = parseFloat(input.value);

                if (this.weightUnit === 'kg') {
                    input.value = this.kgToLbs(value);
                    btn.textContent = 'lbs';
                    this.weightUnit = 'lbs';
                } else {
                    input.value = this.lbsToKg(value);
                    btn.textContent = 'kg';
                    this.weightUnit = 'kg';
                }
                this.emit('unit-changed', { type: 'weight', unit: this.weightUnit });
            }

            /**
             * Cambia unidad de temperatura
             */
            toggleTempUnit() {
                const input = document.getElementById('smokingTemp');
                const btn = document.getElementById('tempUnitBtn');
                const value = parseFloat(input.value);

                if (this.tempUnit === 'C') {
                    input.value = this.celsiusToFahrenheit(value);
                    btn.textContent = '°F';
                    input.min = 150;
                    input.max = 350;
                    input.step = 5;
                    this.tempUnit = 'F';
                } else {
                    input.value = this.fahrenheitToCelsius(value);
                    btn.textContent = '°C';
                    input.min = 65;
                    input.max = 180;
                    input.step = 1;
                    this.tempUnit = 'C';
                }
                this.emit('unit-changed', { type: 'temp', unit: this.tempUnit });
            }

            /**
             * Calcula el tiempo de ahumado
             * @param {string} meatType - Tipo de carne
             * @param {number} weight - Peso (en unidad actual)
             * @param {number} smokingTemp - Temperatura (en unidad actual)
             * @returns {Object} Resultado de cálculo
             */
            calculate() {
                this.emit('calculation-started');

                try {
                    const meatType = document.getElementById('meatType').value;
                    const weight = parseFloat(document.getElementById('weight').value);
                    const smokingTemp = parseFloat(document.getElementById('smokingTemp').value);

                    const formula = this.getMeatFormulas()[meatType];
                    if (!formula) throw new Error('Tipo de carne inválido');

                    // Normalizar a métrico
                    const weightKg = this.weightUnit === 'kg' ? weight : this.lbsToKg(weight);
                    const smokingTempC = this.tempUnit === 'C' ? smokingTemp : this.fahrenheitToCelsius(smokingTemp);

                    // Cálculo base (referencia: 107°C / 225°F)
                    let cookingTimeHours = weightKg * formula.timePerKg;
                    const tempDiffC = smokingTempC - 107;
                    const adjustmentFactor = 1 - (tempDiffC * 0.015);
                    cookingTimeHours = cookingTimeHours * Math.max(0.6, Math.min(1.4, adjustmentFactor));

                    const totalMinutes = Math.round(cookingTimeHours * 60);
                    const hours = Math.floor(totalMinutes / 60);
                    const minutes = totalMinutes % 60;

                    // Generar progresión de temperatura
                    const temperatureRange = this.generateTempRange(formula.minTempC, formula.optimalTempC, 8);

                    // Conversiones para display
                    const result = {
                        id: Date.now(),
                        meatType,
                        meatName: formula.meatName,
                        weightKg: Math.round(weightKg * 100) / 100,
                        weightLbs: this.kgToLbs(weightKg),
                        smokingTempC: Math.round(smokingTempC),
                        smokingTempF: this.celsiusToFahrenheit(smokingTempC),
                        estimatedCookingHours: hours,
                        estimatedCookingMinutes: minutes,
                        totalMinutes: totalMinutes,
                        minTempC: formula.minTempC,
                        minTempF: this.celsiusToFahrenheit(formula.minTempC),
                        optimalTempC: formula.optimalTempC,
                        optimalTempF: this.celsiusToFahrenheit(formula.optimalTempC),
                        holdingMin: formula.holdingMin,
                        temperatureRange: temperatureRange,
                        formula: formula,
                        calculatedAt: new Date().toLocaleString('es-ES')
                    };

                    this.emit('calculation-complete', result);
                    return result;
                } catch (err) {
                    this.emit('calculation-error', err);
                    showToast(`Error: ${err.message}`, 'error');
                    throw err;
                }
            }

            /**
             * Genera rango de temperaturas para gráfico
             */
            generateTempRange(minTempC, maxTempC, steps) {
                const result = [];
                const range = maxTempC - minTempC;

                if (range === 0) {
                    const startTemp = 40;
                    const stepSize = (maxTempC - startTemp) / steps;
                    for (let i = 0; i <= steps; i++) {
                        const temp = startTemp + stepSize * i;
                        result.push({
                            tempC: Math.round(temp),
                            stage: this.getStageForProgress(i / steps)
                        });
                    }
                    return result;
                }

                const step = range / steps;
                for (let i = 0; i <= steps; i++) {
                    const temp = minTempC + step * i;
                    result.push({
                        tempC: Math.round(temp),
                        stage: this.getStageForProgress(i / steps)
                    });
                }
                return result;
            }

            /**
             * Etapas de cocción
             */
            getStageForProgress(progress) {
                if (progress < 0.25) return 'Cocción inicial';
                if (progress < 0.55) return 'Stall (meseta)';
                if (progress < 0.85) return 'Cocción avanzada';
                if (progress < 1) return 'Casi listo';
                return 'Listo - retirar';
            }

            /**
             * Color para barra según temperatura
             */
            getColorForTemp(tempC, optimalC, minC) {
                const range = optimalC - minC;
                if (range === 0) {
                    const pct = tempC / optimalC;
                    if (pct < 0.5) return '#FF6B6B';
                    if (pct < 0.75) return '#FFD93D';
                    if (pct < 0.95) return '#6BCB77';
                    return '#4D96FF';
                }
                const pct = (tempC - minC) / range;
                if (pct < 0.25) return '#FF6B6B';
                if (pct < 0.55) return '#FFD93D';
                if (pct < 0.85) return '#6BCB77';
                return '#4D96FF';
            }
        }

        // ================================================================
        // 3. BBQ VALIDATOR - Validación stratificada
        // ================================================================
        class BBQValidator extends EventEmitter {
            /**
             * Validación Capa 1: Schema (tipos, rangos)
             */
            validateSchema(inputs) {
                const errors = {};

                if (!inputs.weight || inputs.weight < 0.1 || inputs.weight > 100) {
                    errors.weight = 'Peso debe ser entre 0.1 y 100';
                }

                const validTypes = ['tapapecho', 'plateada', 'punta_ganso', 'asado_tira', 'paleta_cerdo', 'costillar_cerdo', 'pollo_entero', 'pavo_entero'];
                if (!inputs.meatType || !validTypes.includes(inputs.meatType)) {
                    errors.meatType = 'Tipo de carne inválido';
                }

                if (!inputs.smokingTemp || inputs.smokingTemp < 65 || inputs.smokingTemp > 180) {
                    errors.smokingTemp = 'Temperatura debe estar entre 65°C y 180°C';
                }

                return { isValid: Object.keys(errors).length === 0, errors };
            }

            /**
             * Validación Capa 2: Reglas de negocio
             */
            validateBusinessRules(inputs, result) {
                const warnings = [];

                if (inputs.smokingTemp < 90) {
                    warnings.push('⚠️ Temperatura muy baja: cocción será muy lenta');
                }

                if (inputs.smokingTemp > 140) {
                    warnings.push('⚠️ Temperatura muy alta: riesgo de resecamiento');
                }

                if (inputs.weight > 8) {
                    warnings.push('⚠️ Peso inusualmente alto: verificar capacidad ahumador');
                }

                if (result && result.totalMinutes > 24 * 60) {
                    warnings.push('ℹ️ Cocción muy larga (>24h): considerar aumentar temperatura');
                }

                return { hasWarnings: warnings.length > 0, warnings };
            }

            /**
             * Validación Capa 3: Restricciones físicas
             */
            validatePhysics(result) {
                const errors = [];

                if (result.estimatedCookingHours > 48) {
                    errors.push('Tiempo de cocción extremadamente alto (>48h)');
                }

                if (result.estimatedCookingHours < 0.5) {
                    errors.push('Tiempo de cocción muy bajo (<0.5h)');
                }

                return { isValid: errors.length === 0, errors };
            }
        }

        // ================================================================
        // 4. STATE MANAGER - Persistencia y estado
        // ================================================================
        class StateManager extends EventEmitter {
            constructor(storageKey = 'bbq-calculator-state') {
                super();
                this.storageKey = storageKey;
                this.state = this.load();
            }

            /**
             * Cargar estado desde localStorage
             */
            load() {
                try {
                    const stored = localStorage.getItem(this.storageKey);
                    return stored ? JSON.parse(stored) : {
                        version: '1.0',
                        recipes: [],
                        userPreferences: {
                            defaultTempUnit: 'C',
                            defaultWeightUnit: 'kg'
                        }
                    };
                } catch (err) {
                    console.error('Error cargando estado:', err);
                    return { recipes: [], userPreferences: {} };
                }
            }

            /**
             * Guardar estado en localStorage
             */
            save() {
                try {
                    localStorage.setItem(this.storageKey, JSON.stringify(this.state));
                    this.emit('state-saved');
                } catch (err) {
                    console.error('Error guardando estado:', err);
                }
            }

            /**
             * Guardar una receta
             */
            addRecipe(result) {
                const recipe = {
                    id: result.id,
                    meatType: result.meatType,
                    meatName: result.meatName,
                    weightKg: result.weightKg,
                    smokingTempC: result.smokingTempC,
                    estimatedHours: result.estimatedCookingHours,
                    calculatedAt: result.calculatedAt,
                    fullResult: result
                };

                this.state.recipes.push(recipe);
                this.save();
                showToast(`✓ Receta guardada: ${result.meatName}`, 'success');
                this.emit('recipe-added', recipe);
            }

            /**
             * Obtener historial de recetas
             */
            getRecipes() {
                return this.state.recipes || [];
            }

            /**
             * Cargar receta anterior
             */
            loadRecipe(id) {
                const recipe = this.state.recipes.find(r => r.id === id);
                if (recipe) {
                    document.getElementById('meatType').value = recipe.meatType;
                    document.getElementById('weight').value = recipe.weightKg;
                    document.getElementById('smokingTemp').value = recipe.smokingTempC;
                    showToast(`✓ Receta cargada: ${recipe.meatName}`, 'success');
                    this.emit('recipe-loaded', recipe);
                }
            }

            /**
             * Mostrar historial
             */
            showHistory() {
                const historyDiv = document.getElementById('history');
                const historyList = document.getElementById('historyList');

                if (historyDiv.style.display === 'none') {
                    const recipes = this.getRecipes();
                    historyList.innerHTML = recipes.length === 0
                        ? '<p style="grid-column: 1/-1; text-align: center; color: #999;">Sin recetas guardadas aún</p>'
                        : recipes.reverse().map(r => `
                            <div class="history-item" onclick="stateManager.loadRecipe(${r.id})">
                                <strong>${r.meatName}</strong><br>
                                ${r.weightKg}kg @ ${r.smokingTempC}°C<br>
                                <small>${r.estimatedHours}h aprox.</small><br>
                                <small style="color:#999;">${r.calculatedAt}</small>
                            </div>
                        `).join('');
                    historyDiv.style.display = 'block';
                } else {
                    historyDiv.style.display = 'none';
                }
            }

            /**
             * Exportar datos
             */
            exportData() {
                const dataStr = JSON.stringify(this.state, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `bbq-calculator-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                showToast('✓ Datos exportados', 'success');
            }

            /**
             * Importar datos
             */
            importData() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        try {
                            const imported = JSON.parse(evt.target.result);
                            this.state = { ...this.state, ...imported };
                            this.save();
                            showToast('✓ Datos importados correctamente', 'success');
                        } catch (err) {
                            showToast('✗ Error importando archivo', 'error');
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }
        }

        // ================================================================
        // 5. RECIPE FACTORY - Patrón Factory
        // ================================================================
        class RecipeFactory {
            static createFromInputs(meatType, weight, smokingTemp, weightUnit, tempUnit) {
                // Convertir a métrico
                const weightKg = weightUnit === 'kg' ? weight : calculator.lbsToKg(weight);
                const smokingTempC = tempUnit === 'C' ? smokingTemp : calculator.fahrenheitToCelsius(smokingTemp);

                return {
                    id: Date.now(),
                    meatType,
                    weightKg,
                    smokingTempC,
                    createdAt: new Date(),
                    metadata: {
                        inputUnit: weightUnit,
                        inputTempUnit: tempUnit
                    }
                };
            }
        }

        // ================================================================
        // 6. UI HELPERS
        // ================================================================
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function displayResult(result) {
            const resultsDiv = document.getElementById('results');

            const resultsHTML = `
                <div class="result-header">
                    <h2>${result.meatName}</h2>
                    <p class="result-weight">
                        ${result.weightKg} kg <span style="color:#999;">(${result.weightLbs} lbs)</span>
                        •
                        ${result.smokingTempC}°C <span style="color:#999;">(${result.smokingTempF}°F)</span>
                    </p>
                </div>

                <div class="result-cards">
                    <div class="card primary">
                        <h3>Tiempo de Cocción</h3>
                        <div class="time-display">
                            <span class="hours">${result.estimatedCookingHours}h</span>
                            <span class="minutes">${result.estimatedCookingMinutes}m</span>
                        </div>
                        <p class="note">Tiempo aproximado de ahumado</p>
                    </div>

                    <div class="card">
                        <h3>Temperatura Interna Objetivo</h3>
                        <div class="temp-range">
                            <p>Mínima: <strong>${result.minTempC}°C</strong><span class="secondary-unit">(${result.minTempF}°F)</span></p>
                            <p>Óptima: <strong>${result.optimalTempC}°C</strong><span class="secondary-unit">(${result.optimalTempF}°F)</span></p>
                        </div>
                    </div>

                    <div class="card">
                        <h3>Tiempo de Reposo</h3>
                        <div class="holding-time">
                            <span class="duration">${result.holdingMin} min</span>
                        </div>
                        <p class="note">A 60°C (140°F) después de cocción</p>
                    </div>
                </div>

                <div class="temperature-chart">
                    <h3>Progresión de Temperatura Interna</h3>
                    <div class="bars">
                        ${result.temperatureRange.map(item => {
                            const percentage = ((item.tempC - result.minTempC) / Math.max(1, (result.optimalTempC - result.minTempC))) * 100;
                            const color = calculator.getColorForTemp(item.tempC, result.optimalTempC, result.minTempC);
                            const tempF = calculator.celsiusToFahrenheit(item.tempC);
                            return `
                                <div class="bar-item">
                                    <div class="bar" style="height: ${Math.max(percentage, 5)}%; background: ${color};"></div>
                                    <span class="temp-label">${item.tempC}°C<span class="secondary">${tempF}°F</span></span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    <div class="stages">
                        ${result.temperatureRange.map(item => `
                            <div class="stage-item">
                                <span class="stage-temp">${item.tempC}°C <span class="secondary">(${calculator.celsiusToFahrenheit(item.tempC)}°F)</span></span>
                                <span class="stage-name">${item.stage}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="tips-section">
                    <h3>💡 Consejos</h3>
                    <ul>
                        <li>Usa un termómetro de carne confiable para verificar la temperatura interna</li>
                        <li>El "wrap" con papel a 74°C (165°F) acelera la cocción y previene resecamiento</li>
                        <li>Los tiempos son aproximados; viento, humedad y abrir la tapa afectan la cocción</li>
                        <li>Reposa la carne en caja aislante a 60°C (140°F) para distribuir jugos</li>
                        <li>Mantén la temperatura del ahumador consistente durante todo el proceso</li>
                    </ul>
                </div>

                <div class="actions-section">
                    <button class="action-btn" onclick="stateManager.addRecipe(lastResult)">💾 Guardar esta Receta</button>
                    <button class="action-btn" onclick="location.href='#'">🔄 Nueva Consulta</button>
                </div>
            `;

            resultsDiv.innerHTML = resultsHTML;
            resultsDiv.classList.add('show');
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ================================================================
        // 7. INSTANCIAS GLOBALES
        // ================================================================
        const calculator = new BBQEngine();
        const validator = new BBQValidator();
        const stateManager = new StateManager();

        let lastResult = null;

        // ================================================================
        // 8. EVENT LISTENERS
        // ================================================================

        // Evento: Cálculo completado
        calculator.on('calculation-complete', (result) => {
            lastResult = result;
            displayResult(result);

            // Validaciones después de cálculo
            const businessCheck = validator.validateBusinessRules(
                {
                    weight: parseFloat(document.getElementById('weight').value),
                    meatType: document.getElementById('meatType').value,
                    smokingTemp: parseFloat(document.getElementById('smokingTemp').value)
                },
                result
            );

            if (businessCheck.hasWarnings) {
                businessCheck.warnings.forEach(warning => {
                    showToast(warning, 'warning');
                });
            }
        });

        // Evento: Error en cálculo
        calculator.on('calculation-error', (err) => {
            console.error('Error:', err);
        });

        // Evento: Receta guardada
        stateManager.on('recipe-added', (recipe) => {
            console.log('Receta guardada:', recipe);
        });

        // ================================================================
        // INICIALIZACIÓN
        // ================================================================
        console.log('✓ BBQ Calculator inicializado con arquitectura GSD-Lite');
        console.log('✓ Fase 1: Correcciones de datos aplicadas (Brisket: 1.65→2.3, Pork: 2.2→2.5)');
        console.log('✓ Fase 2: Arquitectura modular (EventEmitter, Engine, Validator, StateManager)');
        console.log('✓ Fase 3: Persistencia y exportación habilitadas');
    </script>
</body>
