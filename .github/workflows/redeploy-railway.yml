name: Redeploy Railway

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  redeploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: 8d85c544-1bd9-4fb9-8c6d-ee6f85067c92
    steps:
      - name: 1. Find Railway service
        id: find
        run: |
          python3 <<'PYEOF'
          import json, urllib.request, os, sys

          token = os.environ['RAILWAY_TOKEN']
          query = {"query": "{ me { name projects { edges { node { id name services { edges { node { id name } } } environments { edges { node { id name } } } } } } } }"}
          req = urllib.request.Request(
              'https://backboard.railway.com/graphql/v2',
              data=json.dumps(query).encode(),
              headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
          )
          with urllib.request.urlopen(req) as resp:
              d = json.loads(resp.read())

          if 'errors' in d:
              print('Errors:', d['errors']); sys.exit(1)
          if not d.get('data', {}).get('me'):
              print('Token invalid?'); print(d); sys.exit(1)

          print('User:', d['data']['me']['name'])
          found = None
          for pe in d['data']['me']['projects']['edges']:
              p = pe['node']
              envs = p.get('environments', {}).get('edges', [])
              for se in p['services']['edges']:
                  s = se['node']
                  nl = s['name'].lower()
                  print(f"  Project: {p['name']} ({p['id']}) / Service: {s['name']} ({s['id']})")
                  if any(k in nl for k in ['jabenoitv', 'cashclaw', 'workclaw', 'claw']):
                      env_id = envs[0]['node']['id'] if envs else ''
                      found = (s['id'], env_id, s['name'], p['name'], p['id'])

          if not found:
              print('No matching service — using first available:')
              for pe in d['data']['me']['projects']['edges']:
                  p = pe['node']
                  envs = p.get('environments', {}).get('edges', [])
                  for se in p['services']['edges']:
                      s = se['node']
                      env_id = envs[0]['node']['id'] if envs else ''
                      found = (s['id'], env_id, s['name'], p['name'], p['id'])
                      break
                  if found: break

          if not found:
              print('No services found!'); sys.exit(1)

          sid, eid, sname, pname, pid = found
          print(f'\nMatched: project={pname}  service={sname}')
          print(f'  sid={sid}  eid={eid}  pid={pid}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'sid={sid}\neid={eid}\npid={pid}\nsname={sname}\n')
          PYEOF

      - name: 2. Disable Railpack cache via environment variables
        id: set_nocache
        continue-on-error: true
        run: |
          python3 <<'PYEOF'
          import json, urllib.request, os, sys

          token = os.environ['RAILWAY_TOKEN']
          sid = os.environ['SID']
          eid = os.environ['EID']
          pid = os.environ['PID']

          print(f'Setting cache-bust vars: sid={sid} eid={eid} pid={pid}')

          payload = {
              "query": """mutation($pid:String!,$s:String!,$e:String!,$vars:EnvironmentVariables!){
                  variableCollectionUpsert(input:{projectId:$pid,serviceId:$s,environmentId:$e,variables:$vars})
              }""",
              "variables": {
                  "pid": pid, "s": sid, "e": eid,
                  "vars": {"NIXPACKS_NO_CACHE": "1", "RAILPACK_NO_CACHE": "1"}
              }
          }

          req = urllib.request.Request(
              'https://backboard.railway.com/graphql/v2',
              data=json.dumps(payload).encode(),
              headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())

          print(json.dumps(result, indent=2))
          if 'errors' in result:
              print('variableCollectionUpsert failed:', result['errors'], file=sys.stderr)
              sys.exit(1)
          print('Cache-busting variables set successfully!')
          PYEOF
        env:
          SID: ${{ steps.find.outputs.sid }}
          EID: ${{ steps.find.outputs.eid }}
          PID: ${{ steps.find.outputs.pid }}

      - name: 3. Update start command (direct override)
        id: update_cmd
        continue-on-error: true
        run: |
          python3 <<'PYEOF'
          import json, urllib.request, os, sys

          token = os.environ['RAILWAY_TOKEN']
          sid = os.environ['SID']
          eid = os.environ['EID']

          cmd = (
              "node -e \""
              "const fs=require('fs'),os=require('os'),path=require('path'),"
              "sp=require('child_process').spawn;"
              "const w=path.join(os.homedir(),'.workclaw'),"
              "m=path.join(os.homedir(),'.moltlaunch');"
              "fs.mkdirSync(w,{recursive:true});"
              "fs.mkdirSync(m,{recursive:true});"
              "const wc={polling:{intervalMs:30000,urgentIntervalMs:10000},"
              "pricing:{strategy:'fixed',baseRateEth:'0.005',maxRateEth:'0.05'},"
              "specialties:[],autoQuote:true,autoWork:true,maxConcurrentTasks:3,"
              "declineKeywords:[],"
              "agentId:process.env.AGENT_ID||'',"
              "llm:{provider:'anthropic',"
              "apiKey:process.env.ANTHROPIC_API_KEY||'',"
              "model:'claude-sonnet-4-20250514'}};"
              "fs.writeFileSync(path.join(w,'workclaw.json'),JSON.stringify(wc,null,2));"
              "const wl={address:process.env.WALLET_ADDRESS||'',"
              "privateKey:process.env.WALLET_PRIVATE_KEY||''};"
              "fs.writeFileSync(path.join(m,'wallet.json'),JSON.stringify(wl,null,2));"
              "console.log('Config ready. AgentId:',process.env.AGENT_ID);"
              "const b=path.join(process.cwd(),'node_modules','.bin','cashclaw');"
              "sp(fs.existsSync(b)?b:'cashclaw',[],"
              "{stdio:'inherit',env:process.env}).on('exit',c=>process.exit(c||0));\""
          )

          payload = {
              "query": "mutation($s:String!,$e:String!,$c:String!){serviceInstanceUpdate(input:{serviceId:$s,environmentId:$e,startCommand:$c})}",
              "variables": {"s": sid, "e": eid, "c": cmd}
          }

          req = urllib.request.Request(
              'https://backboard.railway.com/graphql/v2',
              data=json.dumps(payload).encode(),
              headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())

          print(json.dumps(result, indent=2))
          if 'errors' in result:
              print('serviceInstanceUpdate errors:', result['errors'])
              sys.exit(1)
          print('Start command updated!')
          PYEOF
        env:
          SID: ${{ steps.find.outputs.sid }}
          EID: ${{ steps.find.outputs.eid }}

      - name: 4. Wait for var to propagate, then trigger redeploy
        run: |
          sleep 5
          python3 <<'PYEOF'
          import json, urllib.request, os, sys

          token = os.environ['RAILWAY_TOKEN']
          sid = os.environ['SID']
          eid = os.environ['EID']

          payload = {
              "query": "mutation($s:String!,$e:String!){serviceInstanceRedeploy(serviceId:$s,environmentId:$e)}",
              "variables": {"s": sid, "e": eid}
          }
          req = urllib.request.Request(
              'https://backboard.railway.com/graphql/v2',
              data=json.dumps(payload).encode(),
              headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())
          print(json.dumps(result, indent=2))
          if 'errors' not in result:
              print('Redeploy triggered!')
          else:
              print('Redeploy error (non-fatal):', result.get('errors'))
          PYEOF
        env:
          SID: ${{ steps.find.outputs.sid }}
          EID: ${{ steps.find.outputs.eid }}

      - name: 5. Verify latest deployments
        run: |
          sleep 8
          python3 <<'PYEOF'
          import json, urllib.request, os

          token = os.environ['RAILWAY_TOKEN']
          sid = os.environ['SID']
          eid = os.environ['EID']

          payload = {
              "query": "query($s:String!,$e:String!){deployments(input:{serviceId:$s,environmentId:$e},first:3){edges{node{id status createdAt}}}}",
              "variables": {"s": sid, "e": eid}
          }
          req = urllib.request.Request(
              'https://backboard.railway.com/graphql/v2',
              data=json.dumps(payload).encode(),
              headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())
          print(json.dumps(result, indent=2))
          PYEOF
        env:
          SID: ${{ steps.find.outputs.sid }}
          EID: ${{ steps.find.outputs.eid }}
